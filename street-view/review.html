<!-- Reviewer for AI-generated parking area polygons, loaded from the parking API. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Street View Parking Review</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="./review.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="topbar-title">Segment Review</h1>
      <label class="topbar-area-label muted">
        Area
        <select id="areaSelect"></select>
      </label>
      <label class="topbar-area-label muted">
        Status
        <select id="reviewFilterField">
          <option value="all">all</option>
          <option value="pending">pending</option>
          <option value="confirmed">confirmed</option>
          <option value="suspect">suspect</option>
        </select>
      </label>
      <input id="segmentSearchField" type="search" placeholder="Search segment..." class="topbar-search" />
    </header>

    <main class="layout">
      <aside class="segment-rail">
        <div class="card rail-card">
          <h2>Segments</h2>
          <p id="segmentCount" class="muted">Loading...</p>
          <div id="segmentList" class="segment-list"></div>
        </div>
      </aside>

      <section class="viewer-column">
        <div class="card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Current Segment</p>
              <h2 id="segmentTitle">Loading...</h2>
            </div>
          </div>
          <div id="segmentMeta" class="meta-grid"></div>
          <div id="captureGrid" class="capture-grid"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Segment Geometry</p>
              <h2>Segment Map</h2>
            </div>
          </div>
          <div class="dual-map-shell">
            <div id="diagramShell" class="diagram-shell">
              <div id="segmentMap" class="segment-map" aria-label="OSM segment map"></div>
            </div>
            <div class="diagram-shell">
              <div id="satelliteMap" class="segment-map" aria-label="Satellite segment map"></div>
            </div>
          </div>

          <!-- Assessment: inline-editable, preset from AI -->
          <form id="overrideForm" class="assessment-form">
            <div class="side-grid">
              <fieldset class="side-fieldset">
                <legend>Left Side</legend>
                <div class="side-summary-row">
                  <label class="check-label"><input id="leftPresentField" type="checkbox" /> Parking</label>
                  <select id="leftMannerField">
                    <option value="none">none</option>
                    <option value="parallel">parallel</option>
                    <option value="perpendicular">perpendicular</option>
                    <option value="diagonal">diagonal</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <select id="leftLevelField">
                    <option value="road_level">road level</option>
                    <option value="sidewalk">sidewalk</option>
                    <option value="gravel_shoulder">gravel shoulder</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <select id="leftFormalityField">
                    <option value="formal">formal</option>
                    <option value="informal">informal</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <span class="confidence-display muted" id="leftConfidenceDisplay"></span>
                </div>
                <input id="leftConfidenceField" type="hidden" />
              </fieldset>
              <fieldset class="side-fieldset">
                <legend>Right Side</legend>
                <div class="side-summary-row">
                  <label class="check-label"><input id="rightPresentField" type="checkbox" /> Parking</label>
                  <select id="rightMannerField">
                    <option value="none">none</option>
                    <option value="parallel">parallel</option>
                    <option value="perpendicular">perpendicular</option>
                    <option value="diagonal">diagonal</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <select id="rightLevelField">
                    <option value="road_level">road level</option>
                    <option value="sidewalk">sidewalk</option>
                    <option value="gravel_shoulder">gravel shoulder</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <select id="rightFormalityField">
                    <option value="formal">formal</option>
                    <option value="informal">informal</option>
                    <option value="mixed">mixed</option>
                    <option value="unknown">unknown</option>
                  </select>
                  <span class="confidence-display muted" id="rightConfidenceDisplay"></span>
                </div>
                <input id="rightConfidenceField" type="hidden" />
              </fieldset>
            </div>
            <input id="decisionField" type="hidden" />
            <input id="confidenceField" type="hidden" />
            <input id="reviewerNotesField" type="hidden" />
          </form>

          <!-- Action bar -->
          <div class="action-bar">
            <button id="acceptAiButton" type="button" class="btn-confirm">Confirm</button>
            <button id="suspectButton" type="button">Suspect</button>
            <span class="action-spacer"></span>
            <button id="prevButton" type="button">Previous</button>
            <button id="nextButton" type="button">Next</button>
          </div>
          <div id="osmSubmitStatus" class="summary-block muted"></div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="./review.js"></script>
  </body>
</html>
