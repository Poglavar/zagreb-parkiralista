<!-- Preglednik AI-generiranih poligona parkirnih zona, podaci iz parking API-ja. -->
<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pregled segmenata parkiranja</title>
    <link rel="icon" href="/parkiralista/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="./review.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="topbar-title">Pregled segmenata</h1>
      <div class="topbar-filters">
        <label class="topbar-area-label muted">
          Područje
          <select id="areaSelect"></select>
        </label>
        <label class="topbar-area-label muted">
          Status
          <select id="reviewFilterField">
            <option value="all">svi</option>
            <option value="pending">na čekanju</option>
            <option value="confirmed">potvrđeno</option>
            <option value="suspect">sumnjivo</option>
          </select>
        </label>
        <label class="topbar-area-label muted">
          Segment
          <select id="segmentJump"></select>
        </label>
      </div>
      <a href="../" class="viewer-link">Karta</a>
    </header>

    <main class="layout-two-col">
      <div class="col-map">
        <div class="card map-card">
          <div id="segmentMeta" class="meta-grid"></div>
          <div class="map-container">
            <div id="segmentMap" class="segment-map" aria-label="Satelitska karta"></div>
            <div id="satelliteMap" class="segment-map" aria-label="OSM karta" hidden></div>
          </div>
        </div>
      </div>

      <div class="col-images">
        <div id="captureGrid" class="capture-grid"></div>
      </div>

      <div class="col-controls">
        <div class="card controls-card">
          <div class="controls-btn-row">
            <button id="mapToggleBtn" type="button" class="map-toggle-btn">OSM karta</button>
            <button id="editModeBtn" type="button" class="map-toggle-btn">Uredi poligone</button>
          </div>

          <form id="overrideForm" class="assessment-form">
            <fieldset class="side-fieldset side-fieldset-left">
              <legend>Lijeva strana <button type="button" class="ai-reason-btn" id="leftReasonBtn" title="AI obrazloženje">🧠</button> <span class="legend-conf" id="leftConfidenceDisplay"></span></legend>
              <div class="side-summary-row">
                <label class="check-label"><input id="leftPresentField" type="checkbox" /> Parkiranje</label>
                <select id="leftMannerField">
                  <option value="none">nema</option>
                  <option value="parallel">uzdužno</option>
                  <option value="perpendicular">okomito</option>
                  <option value="diagonal">koso</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
                <select id="leftLevelField">
                  <option value="road_level">kolnik</option>
                  <option value="sidewalk">pločnik</option>
                  <option value="gravel_shoulder">bankina</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
                <select id="leftFormalityField">
                  <option value="formal">službeno</option>
                  <option value="informal">neslužbeno</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
              </div>
              <input id="leftConfidenceField" type="hidden" />
            </fieldset>
            <fieldset class="side-fieldset side-fieldset-right">
              <legend>Desna strana <button type="button" class="ai-reason-btn" id="rightReasonBtn" title="AI obrazloženje">🧠</button> <span class="legend-conf" id="rightConfidenceDisplay"></span></legend>
              <div class="side-summary-row">
                <label class="check-label"><input id="rightPresentField" type="checkbox" /> Parkiranje</label>
                <select id="rightMannerField">
                  <option value="none">nema</option>
                  <option value="parallel">uzdužno</option>
                  <option value="perpendicular">okomito</option>
                  <option value="diagonal">koso</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
                <select id="rightLevelField">
                  <option value="road_level">kolnik</option>
                  <option value="sidewalk">pločnik</option>
                  <option value="gravel_shoulder">bankina</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
                <select id="rightFormalityField">
                  <option value="formal">službeno</option>
                  <option value="informal">neslužbeno</option>
                  <option value="mixed">mješovito</option>
                  <option value="unknown">nepoznato</option>
                </select>
              </div>
              <input id="rightConfidenceField" type="hidden" />
            </fieldset>
            <input id="decisionField" type="hidden" />
            <input id="confidenceField" type="hidden" />
            <input id="reviewerNotesField" type="hidden" />
          </form>

          <div class="action-grid">
            <button id="acceptAiButton" type="button" class="btn-confirm">Potvrdi</button>
            <button id="suspectButton" type="button">Sumnjivo</button>
            <button id="undoButton" type="button" class="btn-undo" hidden>Poništi</button>
            <button id="prevButton" type="button">&lsaquo; Prethodni</button>
            <button id="nextButton" type="button">Sljedeći &rsaquo;</button>
          </div>
          <p id="osmSubmitStatus" class="status-line muted"></p>
        </div>
      </div>
    </main>

    <div id="aiReasonModal" class="modal-overlay" hidden>
      <div class="modal-card">
        <p><strong id="aiReasonTitle">AI obrazloženje</strong></p>
        <div id="aiReasonContent" class="ai-reason-content"></div>
        <div class="modal-actions">
          <button id="aiReasonClose" type="button">Zatvori</button>
        </div>
      </div>
    </div>

    <div id="suspectModal" class="modal-overlay" hidden>
      <div class="modal-card">
        <p>Sumnjive segmente treba dodatno pregledati.</p>
        <label for="suspectReasonField">Razlog sumnje (opcionalno)</label>
        <input id="suspectReasonField" type="text" placeholder="npr. višestruke tipologije" />
        <div class="modal-actions">
          <button id="suspectModalCancel" type="button">Odustani</button>
          <button id="suspectModalConfirm" type="button" class="btn-suspect-active">Označi sumnjivim</button>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="./review.js"></script>
  </body>
</html>
